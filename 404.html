<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>arome — page introuvable</title>
  <meta name="robots" content="noindex" />
  <meta name="theme-color" content="#0a0a0a" />
  <link rel="icon" type="image/svg+xml" href="https://arome-prod.github.io/arome/images/favicon.svg" />
  <link rel="apple-touch-icon" href="https://arome-prod.github.io/arome/images/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Inter:wght@300;400&display=swap" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: "Inter", system-ui, -apple-system, sans-serif;
      font-weight: 300;
      color: #ededed;
      background:
        radial-gradient(125% 95% at 50% 128%, #38383b 0%, #1a1a1c 38%, #0b0b0c 72%, #060607 100%) no-repeat fixed,
        #060607;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem 1.5rem;
      -webkit-font-smoothing: antialiased;
    }
    .logo { width: clamp(150px, 38vw, 240px); opacity: 0.95; margin-bottom: 2.6rem; }
    .code {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-weight: 300;
      font-size: clamp(4.5rem, 16vw, 9rem);
      line-height: 0.9;
      letter-spacing: 0.02em;
    }
    .msg {
      color: #9a9a9a;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.34em;
      padding-left: 0.34em;
      margin: 1.4rem 0 2.8rem;
    }
    .home {
      display: inline-block;
      color: #ededed;
      text-decoration: none;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      padding: 0.7rem 1.4rem;
      border: 1px solid rgba(255, 255, 255, 0.22);
      transition: border-color 0.3s ease, background 0.3s ease;
    }
    .home:hover { border-color: #ededed; background: rgba(255, 255, 255, 0.04); }
    ::selection { background: rgba(255, 255, 255, 0.16); }
  </style>
</head>
<body>
  <img class="logo" src="https://arome-prod.github.io/arome/images/arome_logo.svg" alt="arome" />
  <div class="code">404</div>
  <p class="msg">Cette page s'est évaporée</p>
  <a class="home" href="https://arome-prod.github.io/arome/">Retour à l'accueil</a>
</body>
</html>
