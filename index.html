<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>arome — créations</title>
  <meta name="description" content="arome — photo, vidéo, design." />
  <meta name="theme-color" content="#0a0a0a" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="css/style.css?v=52" />
</head>
<body class="mode-home">

  <!-- ===== Fond parallaxe (réagit à la souris) ===== -->
  <div class="bg" id="bg" aria-hidden="true"></div>

  <!-- ===== Brume animée (accueil uniquement) ===== -->
  <canvas class="home-fx" id="homeFx" aria-hidden="true"></canvas>

  <!-- ===== Marque : se déplace de l'écran d'accueil vers la barre du haut ===== -->
  <header class="brand">
    <a class="brand__logo" data-go="home" data-admin-trigger aria-label="arome — accueil">
      <img class="brand__logomark" src="images/arome_logo.svg?v=52" alt="arome" />
    </a>
    <p class="brand__tag" id="heroTagline">…</p>
    <nav class="brand__nav">
      <button type="button" data-go="portfolio">Portfolio</button>
      <button type="button" data-go="inspirations">Inspirations</button>
      <button type="button" data-go="about">À propos</button>
      <button type="button" data-go="contact">Contact</button>
    </nav>
  </header>

  <!-- ===== Contenu (panneaux) ===== -->
  <main class="stage">
    <!-- Portfolio -->
    <section class="panel" data-panel="portfolio">
      <div class="section">

        <!-- Vue : grille des albums -->
        <div id="albumsView">
          <header class="section__head">
            <h2 class="section__title">Portfolio</h2>
            <div class="filters" id="filters"></div>
          </header>
          <div class="albums-wrap">
            <button class="albums-arrow albums-arrow--prev" id="albumsPrev" aria-label="Défiler à gauche" hidden>‹</button>
            <div class="albums" id="albums">
              <div class="gallery__loading">Chargement…</div>
            </div>
            <button class="albums-arrow albums-arrow--next" id="albumsNext" aria-label="Défiler à droite" hidden>›</button>
          </div>
        </div>

        <!-- Vue : album ouvert (page dédiée) -->
        <div id="albumView" hidden>
          <button class="album-back" id="albumBack">← Tous les projets</button>
          <header class="album-head">
            <p class="eyebrow" id="albumCat"></p>
            <h2 class="section__title section__title--xl" id="albumTitle"></h2>
            <p class="section__lead" id="albumDesc"></p>
            <div id="albumLinkWrap"></div>
          </header>
          <div class="gallery" id="albumPhotos"></div>
        </div>

        <!-- Vue : contenu YouTube (liste de vidéos) -->
        <div id="youtubeView" hidden>
          <button class="album-back" id="ytBack">← Tous les projets</button>
          <header class="album-head">
            <p class="eyebrow">Vidéos</p>
            <h2 class="section__title section__title--xl">Contenu YouTube</h2>
          </header>
          <div class="yt-list" id="youtubeList"></div>
        </div>

      </div>
    </section>

    <!-- Inspirations -->
    <section class="panel" data-panel="inspirations">
      <div class="section">
        <header class="section__head">
          <h2 class="section__title">Inspirations</h2>
          <p class="section__lead">Les films, musiques et lectures qui nourrissent mon univers.</p>
          <div class="filters" id="inspFilters"></div>
        </header>
        <div class="albums-wrap">
          <button class="albums-arrow albums-arrow--prev" id="inspPrev" aria-label="Défiler à gauche" hidden>‹</button>
          <div class="albums" id="inspWall">
            <div class="gallery__loading">Chargement…</div>
          </div>
          <button class="albums-arrow albums-arrow--next" id="inspNext" aria-label="Défiler à droite" hidden>›</button>
        </div>
      </div>
    </section>

    <!-- À propos -->
    <section class="panel" data-panel="about">
      <div class="section">
        <div class="about">
          <h2 class="about__big">arome</h2>
          <div id="aboutText" class="about__text"></div>
          <ul class="skills" id="aboutSkills"></ul>
          <div class="about__files">
            <a class="btn" href="files/cv-mathys-lemarie.pdf" download>CV ↓</a>
            <a class="btn" href="files/book-photogravure.pdf" download>Book photogravure ↓</a>
          </div>
        </div>
      </div>
    </section>

    <!-- Contact -->
    <section class="panel" data-panel="contact">
      <div class="section">
        <h2 class="section__title section__title--xl">On travaille ensemble ?</h2>
        <p class="section__lead">Un projet, une collab, une question — la porte est ouverte.</p>
        <div class="contact-links" id="contactLinks"></div>
      </div>
    </section>

    <footer class="foot">
      <img class="foot__logo" src="images/arome_logo.svg?v=52" alt="arome" />
      <span class="foot__meta">Paris · © <span id="year"></span> arome</span>
    </footer>
  </main>

  <!-- ===== Store de transition (remonte pour révéler la page) ===== -->
  <div class="store" aria-hidden="true"></div>

  <!-- ===== Lightbox (image ou lecteur vidéo) ===== -->
  <div id="lightbox" class="lightbox" aria-hidden="true">
    <button class="lightbox__close" id="lbClose" aria-label="Fermer">✕</button>
    <button class="lightbox__nav lightbox__prev" id="lbPrev" aria-label="Précédent">‹</button>
    <div class="lightbox__stage">
      <img class="lightbox__img" id="lbImg" alt="" hidden />
      <div class="lightbox__video" id="lbVideoWrap" hidden>
        <iframe id="lbVideo" title="Lecteur vidéo" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
      </div>
      <p class="lightbox__title" id="lbTitle"></p>
    </div>
    <button class="lightbox__nav lightbox__next" id="lbNext" aria-label="Suivant">›</button>
  </div>

  <!-- ===== Grain cinématographique ===== -->
  <div class="grain" aria-hidden="true"></div>

  <!-- ===== Curseur personnalisé ===== -->
  <div class="cursor" id="cursor" aria-hidden="true"></div>

  <script type="module" src="js/app.js?v=52"></script>
  <script type="module" src="js/home-fx.js?v=52"></script>
  <script type="module" src="js/parallax.js?v=52"></script>
  <script type="module" src="js/cursor.js?v=52"></script>
</body>
</html>
